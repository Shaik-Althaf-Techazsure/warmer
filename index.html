<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechAZsure | Warmer Pro Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background-color: #fff5f0; font-family: 'Segoe UI', Roboto, sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 8px 24px rgba(255, 69, 0, 0.1); }
        .temp-display { font-size: 5rem; font-weight: 800; color: #ff4500; line-height: 1; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); }
        .status-badge { padding: 10px 20px; border-radius: 50px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn-warm { background: linear-gradient(45deg, #ff4500, #ff8c00); color: white; border: none; font-weight: bold; }
        .btn-warm:hover { background: linear-gradient(45deg, #e03e00, #e67e00); color: white; }
        .control-label { font-size: 0.85rem; font-weight: 700; color: #666; text-transform: uppercase; }
        .nav-header { background-color: #ff4500; color: white; padding: 15px 0; border-bottom: 4px solid #cc3700; }
    </style>
</head>
<body>

<div class="nav-header shadow-sm mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <h4 class="mb-0 fw-bold">WARMER CONTROL PANEL</h4>
        <span id="mqtt-status" class="badge rounded-pill bg-dark">CONNECTING...</span>
    </div>
</div>

<div class="container">
    <div class="row g-4">
        
        <div class="col-md-6">
            <div class="card p-5 text-center h-100">
                <span class="control-label mb-2">Live Temperature</span>
                <div class="temp-display my-4"><span id="temp-val">--.-</span>°C</div>
                <div>
                    <span id="status-badge" class="status-badge bg-secondary text-white">IDLE</span>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-4 h-100">
                <h5 class="fw-bold mb-4">Remote Settings</h5>
                
                <div class="mb-4">
                    <label class="control-label mb-2">Set Point Temperature</label>
                    <div class="input-group input-group-lg">
                        <input type="number" id="target-temp" class="form-control" value="40">
                        <button class="btn btn-warm" onclick="sendTarget()">UPDATE</button>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-12">
                        <button onclick="controlAction('START')" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-sm">START WARMING</button>
                    </div>
                    <div class="col-12">
                        <button onclick="controlAction('STOP')" class="btn btn-outline-danger btn-lg w-100 mt-2 fw-bold">EMERGENCY SHUTDOWN</button>
                    </div>
                </div>

                <div class="mt-4 p-3 bg-light rounded-3">
                    <small class="text-muted"><strong>Safety Note:</strong> Relay triggers on LOW signal. Ensure 12V element has proper ventilation.</small>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // MQTT Configuration - Points to the HiveMQ Public Broker
    const client = mqtt.connect('ws://broker.hivemq.com:8000/mqtt');

    const tempSpan = document.getElementById('temp-val');
    const statusBadge = document.getElementById('status-badge');
    const mqttBadge = document.getElementById('mqtt-status');

    client.on('connect', () => {
        mqttBadge.innerText = "ONLINE";
        mqttBadge.className = "badge rounded-pill bg-success";
        // Subscribe to stats published by your ESP32 Warmer code
        client.subscribe('warmer/temp');
        client.subscribe('warmer/status');
    });

    client.on('message', (topic, message) => {
        const payload = message.toString();

        if (topic === 'warmer/temp') {
            tempSpan.innerText = parseFloat(payload).toFixed(1);
        }

        if (topic === 'warmer/status') {
            statusBadge.innerText = payload;
            if (payload === "RUNNING") {
                statusBadge.className = "status-badge bg-danger text-white shadow";
            } else {
                statusBadge.className = "status-badge bg-secondary text-white";
            }
        }
    });

    function sendTarget() {
        const val = document.getElementById('target-temp').value;
        // This sends the target to the ESP32 (Ensure you add a subscriber in ESP32 for this topic)
        client.publish('warmer/cmd/target', val);
        alert("Target Temperature Set to " + val + "°C");
    }

    function controlAction(act) {
        // Sends command to start or stop the Warming process
        client.publish('warmer/cmd/action', act);
    }

    client.on('close', () => {
        mqttBadge.innerText = "OFFLINE";
        mqttBadge.className = "badge rounded-pill bg-danger";
    });
</script>

</body>
</html>
