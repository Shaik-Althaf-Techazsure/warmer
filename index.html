<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechAZsure | Warmer Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root { --warm-orange: #ff4500; --soft-bg: #fffbf9; }
        body { background-color: var(--soft-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .dashboard-card { border: none; border-radius: 24px; box-shadow: 0 12px 30px rgba(255, 69, 0, 0.08); transition: 0.3s; }
        .temp-display { font-size: 5.5rem; font-weight: 800; color: var(--warm-orange); letter-spacing: -2px; }
        .status-pill { padding: 10px 25px; border-radius: 50px; font-weight: 700; font-size: 1rem; text-transform: uppercase; }
        .log-window { background: #1a1a1a; color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 12px; height: 150px; overflow-y: auto; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .btn-action { border-radius: 12px; padding: 15px; font-weight: 700; transition: 0.2s; border: none; }
        .btn-start { background: linear-gradient(45deg, #28a745, #218838); color: white; }
        .btn-stop { background: linear-gradient(45deg, #dc3545, #c82333); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4 py-3">
    <div class="container">
        <span class="navbar-brand fw-bold">🔥 TECHAZSURE WARMER</span>
        <span id="mqtt-status" class="badge rounded-pill bg-danger px-3">CONNECTING...</span>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        
        <div class="col-lg-6">
            <div class="card dashboard-card p-5 text-center h-100">
                <p class="text-uppercase text-muted small fw-bold tracking-wider">Live Sensor Temperature</p>
                <div class="temp-display my-2"><span id="live-temp">--.-</span>°C</div>
                <div class="mt-3">
                    <span id="sys-status" class="status-pill bg-secondary text-white">SYSTEM IDLE</span>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card dashboard-card p-4 h-100">
                <h5 class="fw-bold mb-4">Device Controls</h5>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">SET TARGET TEMPERATURE (°C)</label>
                    <div class="input-group input-group-lg shadow-sm">
                        <input type="number" id="set-temp" class="form-control border-end-0" value="40">
                        <button class="btn btn-dark px-4" onclick="updateTarget()">SET</button>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-12">
                        <button onclick="sendCommand('START')" class="btn btn-start btn-action w-100 shadow-sm mb-2">START WARMING</button>
                    </div>
                    <div class="col-12">
                        <button onclick="sendCommand('STOP')" class="btn btn-stop btn-action w-100">EMERGENCY STOP</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card dashboard-card p-3">
                <p class="small text-muted mb-2 fw-bold">DEVICE TRAFFIC MONITOR:</p>
                <div id="debug-log" class="log-window">Initializing connection...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- MQTT CONFIGURATION ---
    // Using WSS (Secure) and Port 8884 for HTTPS/Mobile compatibility
    const broker = 'wss://broker.hivemq.com:8884/mqtt';
    const client = mqtt.connect(broker, {
        clientId: 'TechAZ_Web_' + Math.random().toString(16).substring(2, 10),
        keepalive: 60
    });

    const logEl = document.getElementById('debug-log');
    const tempEl = document.getElementById('live-temp');

    function logger(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        const color = isError ? 'color: #ff4d4d;' : '';
        logEl.innerHTML += `<div style="${color}">[${time}] ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    client.on('connect', () => {
        document.getElementById('mqtt-status').className = "badge rounded-pill bg-success px-3";
        document.getElementById('mqtt-status').innerText = "CONNECTED";
        logger("Connected to HiveMQ Secure WebSocket Broker");
        
        // Use wildcard to catch any topic starting with 'warmer/'
        client.subscribe('warmer/#');
        logger("Listening to 'warmer/#' topics...");
    });

    client.on('message', (topic, message) => {
        const payload = message.toString();
        logger(`Topic: ${topic} | Data: ${payload}`);

        // Handle Temperature Data
        if (topic.toLowerCase().includes('temp')) {
            if (payload === "-127.00" || payload === "-127") {
                tempEl.innerText = "ERR";
                tempEl.style.color = "red";
                logger("⚠️ SENSOR ERROR: Check DS18B20 wiring!", true);
            } else {
                tempEl.innerText = payload;
                tempEl.style.color = "var(--warm-orange)";
            }
        }

        // Handle Status Data
        if (topic.toLowerCase().includes('status')) {
            const statusBadge = document.getElementById('sys-status');
            statusBadge.innerText = "SYSTEM " + payload;
            if (payload.toUpperCase() === "RUNNING") {
                statusBadge.className = "status-pill bg-danger text-white shadow";
            } else {
                statusBadge.className = "status-pill bg-secondary text-white";
            }
        }
    });

    function updateTarget() {
        const val = document.getElementById('set-temp').value;
        client.publish('warmer/cmd/target', val);
        logger(`Published new Target: ${val}°C`);
    }

    function sendCommand(cmd) {
        client.publish('warmer/cmd/action', cmd);
        logger(`Published Command: ${cmd}`);
    }

    client.on('error', (err) => {
        logger("Connection Error: " + err, true);
        document.getElementById('mqtt-status').className = "badge rounded-pill bg-danger px-3";
        document.getElementById('mqtt-status').innerText = "ERROR";
    });
</script>

</body>
</html>
